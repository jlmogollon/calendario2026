<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Calendario IPUE 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400;1,600&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f5f6fa;
  --bg2: #ffffff;
  --surface: #ffffff;
  --surface2: #f0f2f8;
  --surface3: #e8eaf2;
  --border: rgba(0,0,0,0.08);
  --border2: rgba(0,0,0,0.14);
  --text: #1a2035;
  --text-dim: #4a5568;
  --text-muted: #8a96aa;
  --gold: #b5782a;
  --gold-light: #c8943a;
  --gold-dim: rgba(181,120,42,0.10);
  --blue: #1e6fa8;
  --sky: #2a8ab0;
  --sky-dim: rgba(42,138,176,0.10);
  --nacional: #b5782a;
  --nacional-dim: rgba(181,120,42,0.10);
  --distrital: #2a8ab0;
  --distrital-dim: rgba(42,138,176,0.10);
  --local: #2e8a5e;
  --local-dim: rgba(46,138,94,0.10);
  --error: #c0392b;
  --safe: env(safe-area-inset-bottom, 0px);
}
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html { background: var(--bg); }
body {
  font-family:'DM Sans', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  min-height: -webkit-fill-available;
  overflow-x: hidden;
  -webkit-font-smoothing: antialiased;
}

/* ── HEADER ── */
header {
  position: sticky;
  top: 0;
  z-index: 200;
  background: rgba(255,255,255,0.97);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-bottom: 2px solid rgba(181,120,42,0.25);
  padding: 0 16px;
  box-shadow: 0 2px 12px rgba(0,0,0,0.07);
}
.header-inner {
  display: flex;
  align-items: center;
  height: 72px;
  gap: 10px;
}
.logo-img {
  height: 52px;
  width: auto;
  object-fit: contain;
  flex-shrink: 0;
  border-radius: 10px;
  padding: 0;
}
.header-divider {
  width: 1px;
  height: 32px;
  background: rgba(181,120,42,0.3);
  flex-shrink: 0;
}
.header-title {
  flex: 1;
  min-width: 0;
}
.header-title h1 {
  font-family: 'Playfair Display', serif;
  font-size: 1.0rem;
  font-weight: 600;
  color: var(--gold);
  letter-spacing: 0.04em;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.header-title p {
  font-size: 0.72rem;
  color: var(--text-muted);
  letter-spacing: 0.12em;
  text-transform: uppercase;
  margin-top: 1px;
}
.header-year {
  font-family: 'Playfair Display', serif;
  font-size: 1.6rem;
  font-weight: 400;
  color: rgba(181,120,42,0.5);
  letter-spacing: 0.02em;
  flex-shrink: 0;
}

/* ── FILTER BAR ── */
.filter-bar {
  position: sticky;
  top: 72px;
  z-index: 190;
  background: rgba(245,246,250,0.97);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  padding: 10px 16px;
  display: flex;
  gap: 8px;
  border-bottom: 1px solid var(--border);
}
.filter-pill {
  flex: 1;
  padding: 7px 4px;
  border: 1px solid var(--border2);
  background: var(--surface);
  color: var(--text-dim);
  border-radius: 20px;
  font-family: 'DM Sans', sans-serif;
  font-size: 0.82rem;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.2s;
  text-align: center;
  white-space: nowrap;
  letter-spacing: 0.01em;
  -webkit-user-select: none;
  user-select: none;
}
.filter-pill.active-all { background: var(--surface3); color: var(--text); border-color: var(--border2); }
.filter-pill.active-nacional { background: var(--nacional-dim); color: var(--nacional); border-color: var(--nacional); }
.filter-pill.active-distrital { background: var(--distrital-dim); color: var(--distrital); border-color: var(--distrital); }
.filter-pill.active-local { background: var(--local-dim); color: var(--local); border-color: var(--local); }

/* ── STATS BAR ── */
.stats-bar {
  display: flex;
  gap: 1px;
  margin: 12px 16px 0;
  border-radius: 10px;
  overflow: hidden;
  border: 1px solid var(--border);
}
.stat-item {
  flex: 1;
  padding: 10px 8px;
  background: var(--surface);
  text-align: center;
  border: none;
}
.stat-num {
  font-family: 'Playfair Display', serif;
  font-size: 1.5rem;
  font-weight: 600;
  line-height: 1;
}
.stat-label {
  font-size: 0.68rem;
  color: var(--text-muted);
  letter-spacing: 0.1em;
  text-transform: uppercase;
  margin-top: 3px;
}
.stat-item.nac .stat-num { color: var(--nacional); }
.stat-item.dist .stat-num { color: var(--distrital); }
.stat-item.loc .stat-num { color: var(--local); }

/* ── MONTH GROUPS ── */
.events-list { padding: 16px 16px 100px; }

.month-group { margin-bottom: 28px; }
.month-group.hidden { display: none; }

.month-header {
  display: flex;
  align-items: baseline;
  gap: 10px;
  margin-bottom: 12px;
  padding-bottom: 8px;
  border-bottom: 1px solid var(--border);
}
.month-name {
  font-family: 'Playfair Display', serif;
  font-size: 1.55rem;
  font-weight: 600;
  font-style: italic;
  color: var(--text);
}
.month-header { border-bottom-color: rgba(0,0,0,0.07); }
.month-count {
  font-size: 0.78rem;
  color: var(--text-muted);
  letter-spacing: 0.06em;
}
.month-dots {
  margin-left: auto;
  display: flex;
  gap: 4px;
  align-items: center;
}
.month-dot {
  width: 6px; height: 6px;
  border-radius: 50%;
}

/* ── EVENT CARD ── */
.event-card {
  display: flex;
  align-items: stretch;
  gap: 0;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  margin-bottom: 8px;
  overflow: hidden;
  cursor: pointer;
  transition: all 0.18s;
  position: relative;
  box-shadow: 0 1px 4px rgba(0,0,0,0.06);
}
.event-card:active { transform: scale(0.98); opacity: 0.85; }
.event-card.ev-nacional { border-left: 3px solid var(--nacional); }
.event-card.ev-distrital { border-left: 3px solid var(--distrital); }
.event-card.ev-local { border-left: 3px solid var(--local); }
.event-card.ev-error { border-right: 3px solid var(--error); }
.event-card.hidden { display: none; }

.event-date-col {
  width: 52px;
  flex-shrink: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 10px 4px;
  border-right: 1px solid var(--border);
  background: rgba(0,0,0,0.025);
}
.event-day {
  font-family: 'Playfair Display', serif;
  font-size: 1.5rem;
  font-weight: 700;
  line-height: 1;
  color: var(--text);
}
.event-month-short {
  font-size: 0.68rem;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--text-muted);
  margin-top: 2px;
}
.event-multi-day {
  font-size: 0.66rem;
  color: var(--sky);
  margin-top: 4px;
  text-align: center;
}

.event-body {
  flex: 1;
  padding: 10px 12px;
  min-width: 0;
}
.event-name {
  font-size: 0.92rem;
  font-weight: 500;
  color: var(--text);
  line-height: 1.35;
  margin-bottom: 5px;
}
.event-meta {
  display: flex;
  align-items: center;
  gap: 6px;
  flex-wrap: wrap;
}
.level-badge {
  font-size: 0.65rem;
  font-weight: 600;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  padding: 3px 8px;
  border-radius: 10px;
}
.badge-nacional { background: var(--nacional-dim); color: var(--nacional); }
.badge-distrital { background: var(--distrital-dim); color: var(--distrital); }
.badge-local { background: var(--local-dim); color: var(--local); }

.cat-tag {
  font-size: 0.65rem;
  color: var(--text-muted);
  padding: 3px 7px;
  background: rgba(0,0,0,0.04);
  border-radius: 8px;
  border: 1px solid var(--border);
}
.event-desc {
  font-size: 0.78rem;
  color: var(--text-dim);
  margin-top: 4px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.error-icon {
  flex-shrink: 0;
  padding: 0 10px 0 4px;
  display: flex;
  align-items: center;
  color: var(--error);
  font-size: 0.9rem;
}

/* ── FAB ── */
.fab {
  position: fixed;
  bottom: calc(20px + var(--safe));
  right: 20px;
  z-index: 300;
  width: 52px;
  height: 52px;
  border-radius: 50%;
  background: var(--gold);
  color: #ffffff;
  border: none;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  box-shadow: 0 4px 20px rgba(181,120,42,0.35);
  font-size: 1.4rem;
  font-weight: 300;
  transition: all 0.2s;
  -webkit-user-select: none;
}
.fab:active { transform: scale(0.92); }

/* ── MODAL OVERLAY ── */
.modal-overlay {
  position: fixed;
  inset: 0;
  z-index: 500;
  background: rgba(100,110,130,0.45);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  display: flex;
  align-items: flex-end;
  justify-content: center;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.25s;
}
.modal-overlay.open {
  opacity: 1;
  pointer-events: all;
}
.modal-sheet {
  width: 100%;
  max-width: 480px;
  background: var(--bg2);
  border: 1px solid var(--border);
  border-bottom: none;
  border-radius: 20px 20px 0 0;
  padding: 20px 20px calc(20px + var(--safe));
  transform: translateY(40px);
  transition: transform 0.28s cubic-bezier(0.34, 1.56, 0.64, 1);
  max-height: 90vh;
  overflow-y: auto;
  box-shadow: 0 -4px 30px rgba(0,0,0,0.12);
}
.modal-overlay.open .modal-sheet {
  transform: translateY(0);
}
.modal-handle {
  width: 36px;
  height: 3px;
  background: var(--border2);
  border-radius: 2px;
  margin: 0 auto 18px;
}
.modal-title {
  font-family: 'Playfair Display', serif;
  font-size: 1.4rem;
  font-weight: 600;
  color: var(--gold);
  margin-bottom: 20px;
  letter-spacing: 0.01em;
}
.form-group { margin-bottom: 14px; }
.form-group label {
  display: block;
  font-size: 0.76rem;
  font-weight: 500;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--text-muted);
  margin-bottom: 6px;
}
.form-group input,
.form-group textarea,
.form-group select {
  width: 100%;
  padding: 11px 14px;
  background: var(--surface2);
  border: 1px solid var(--border2);
  border-radius: 10px;
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  font-size: 0.95rem;
  outline: none;
  transition: border-color 0.18s;
  -webkit-appearance: none;
}
.form-group input:focus,
.form-group textarea:focus,
.form-group select:focus {
  border-color: var(--gold);
}
.form-group textarea { resize: none; height: 72px; }
.form-group select option { background: #ffffff; color: var(--text); }
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

.level-selector {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
}
.level-btn {
  flex: 1;
  min-width: 80px;
  padding: 9px 8px;
  border-radius: 10px;
  border: 1.5px solid var(--border2);
  background: var(--surface);
  color: var(--text-dim);
  font-family: 'DM Sans', sans-serif;
  font-size: 0.84rem;
  font-weight: 600;
  cursor: pointer;
  text-align: center;
  transition: all 0.15s;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  -webkit-user-select: none;
}
.level-btn.sel-nacional { background: var(--nacional-dim); color: var(--nacional); border-color: var(--nacional); }
.level-btn.sel-distrital { background: var(--distrital-dim); color: var(--distrital); border-color: var(--distrital); }
.level-btn.sel-local { background: var(--local-dim); color: var(--local); border-color: var(--local); }

.modal-actions {
  display: flex;
  gap: 10px;
  margin-top: 18px;
}
.btn-cancel {
  flex: 1;
  padding: 12px;
  background: var(--surface);
  border: 1px solid var(--border2);
  border-radius: 10px;
  color: var(--text-dim);
  font-family: 'DM Sans', sans-serif;
  font-size: 0.92rem;
  font-weight: 500;
  cursor: pointer;
}
.btn-save {
  flex: 2;
  padding: 12px;
  background: var(--gold);
  border: none;
  border-radius: 10px;
  color: #ffffff;
  font-family: 'DM Sans', sans-serif;
  font-size: 0.92rem;
  font-weight: 700;
  cursor: pointer;
  letter-spacing: 0.03em;
}
.btn-delete {
  flex: 1;
  padding: 12px;
  background: rgba(212,96,90,0.12);
  border: 1px solid rgba(212,96,90,0.3);
  border-radius: 10px;
  color: var(--error);
  font-family: 'DM Sans', sans-serif;
  font-size: 0.85rem;
  font-weight: 500;
  cursor: pointer;
}


/* ── CATEGORY MANAGER MODAL ── */
.cat-manager-overlay {
  position: fixed;
  inset: 0;
  z-index: 600;
  background: rgba(100,110,130,0.45);
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
  display: flex;
  align-items: flex-end;
  justify-content: center;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.25s;
}
.cat-manager-overlay.open { opacity: 1; pointer-events: all; }
.cat-manager-sheet {
  width: 100%;
  max-width: 480px;
  background: var(--bg2);
  border: 1px solid var(--border);
  border-bottom: none;
  border-radius: 20px 20px 0 0;
  padding: 20px 20px calc(20px + var(--safe));
  transform: translateY(40px);
  transition: transform 0.28s cubic-bezier(0.34, 1.56, 0.64, 1);
  max-height: 85vh;
  overflow-y: auto;
  box-shadow: 0 -4px 30px rgba(0,0,0,0.12);
}
.cat-manager-overlay.open .cat-manager-sheet { transform: translateY(0); }
.cat-list { margin: 14px 0; display: flex; flex-direction: column; gap: 8px; }
.cat-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 12px;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 10px;
}
.cat-swatch {
  width: 28px; height: 28px;
  border-radius: 50%;
  flex-shrink: 0;
  border: 2px solid rgba(255,255,255,0.1);
  cursor: pointer;
  position: relative;
}
.cat-swatch input[type="color"] {
  position: absolute;
  inset: 0;
  opacity: 0;
  cursor: pointer;
  width: 100%;
  height: 100%;
  border: none;
  padding: 0;
}
.cat-item-label {
  flex: 1;
  font-size: 0.9rem;
  color: var(--text);
  background: transparent;
  border: none;
  outline: none;
  font-family: 'DM Sans', sans-serif;
  min-width: 0;
}
.cat-item-label:focus {
  border-bottom: 1px solid var(--gold);
}
.cat-del-btn {
  width: 26px; height: 26px;
  border-radius: 50%;
  border: 1px solid rgba(212,96,90,0.3);
  background: rgba(212,96,90,0.08);
  color: var(--error);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 0.9rem;
  flex-shrink: 0;
}
.btn-add-cat {
  width: 100%;
  padding: 11px;
  background: var(--surface2);
  border: 1px dashed rgba(0,0,0,0.18);
  border-radius: 10px;
  color: var(--text-dim);
  font-family: 'DM Sans', sans-serif;
  font-size: 0.9rem;
  cursor: pointer;
  transition: all 0.18s;
  letter-spacing: 0.03em;
}
.btn-add-cat:active { background: var(--surface3); }
.manage-cat-link {
  font-size: 0.72rem;
  color: var(--text-muted);
  text-decoration: underline;
  background: none;
  border: none;
  cursor: pointer;
  font-family: 'DM Sans', sans-serif;
  letter-spacing: 0.06em;
  display: block;
  text-align: right;
  margin-top: 4px;
  -webkit-user-select: none;
}


/* ── VIEW TOGGLE BAR ── */
.view-bar {
  position: sticky;
  top: 72px;
  z-index: 195;
  background: rgba(255,255,255,0.97);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  display: flex;
  gap: 1px;
  border-bottom: 1px solid var(--border);
  box-shadow: 0 1px 4px rgba(0,0,0,0.05);
}
.view-tab {
  flex: 1;
  padding: 11px 4px;
  background: transparent;
  border: none;
  color: var(--text-muted);
  font-family: 'DM Sans', sans-serif;
  font-size: 0.82rem;
  font-weight: 600;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  cursor: pointer;
  transition: all 0.18s;
  -webkit-user-select: none;
  position: relative;
}
.view-tab.active {
  color: var(--gold);
}
.view-tab.active::after {
  content: '';
  position: absolute;
  bottom: 0; left: 20%; right: 20%;
  height: 2px;
  background: var(--gold);
  border-radius: 2px;
}

/* ── CALENDAR MONTH VIEW ── */
.cal-section { display: none; padding: 12px 16px 100px; }
.cal-section.active { display: block; }
.list-section { display: none; padding: 0; }
.list-section.active { display: block; }

.cal-month-nav {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 4px 0 14px;
}
.cal-month-title {
  font-family: 'Playfair Display', serif;
  font-size: 1.45rem;
  font-weight: 600;
  font-style: italic;
  color: var(--text);
  letter-spacing: 0.01em;
}
.cal-month-title strong { font-style: normal; color: var(--gold); }
.cal-nav-btns { display: flex; gap: 8px; }
.cal-nav-btn {
  width: 34px; height: 34px;
  border-radius: 50%;
  border: 1px solid var(--border2);
  background: var(--surface);
  color: var(--text-dim);
  font-size: 1.1rem;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.15s;
}
.cal-nav-btn:active { transform: scale(0.92); }

.cal-day-headers {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 2px;
  margin-bottom: 4px;
}
.cal-day-hdr {
  text-align: center;
  font-size: 0.72rem;
  font-weight: 700;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--text-muted);
  padding: 4px 0;
}
.cal-day-hdr.weekend { color: var(--gold); }

.cal-grid {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 3px;
}
.cal-cell {
  aspect-ratio: 1;
  border-radius: 8px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: flex-start;
  padding: 5px 2px 3px;
  position: relative;
  cursor: pointer;
  transition: background 0.12s;
  min-height: 44px;
}
.cal-cell.other-month { opacity: 0.2; pointer-events: none; }
.cal-cell.free { background: rgba(46,138,94,0.06); }
.cal-cell.has-events { background: rgba(181,120,42,0.07); }
.cal-cell.today .cal-num {
  background: var(--gold);
  color: #ffffff;
  width: 22px; height: 22px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-weight: 700;
}
.cal-cell.weekend .cal-num { color: var(--gold-light); }
.cal-num {
  font-size: 0.88rem;
  font-weight: 500;
  color: var(--text-dim);
  line-height: 1;
  width: 22px; height: 22px;
  display: flex; align-items: center; justify-content: center;
}
.cal-dots {
  display: flex;
  flex-wrap: wrap;
  gap: 2px;
  justify-content: center;
  margin-top: 3px;
  max-width: 100%;
}
.cal-dot {
  width: 5px; height: 5px;
  border-radius: 50%;
  flex-shrink: 0;
}
.cal-free-badge {
  position: absolute;
  bottom: 2px;
  width: 16px; height: 2px;
  border-radius: 1px;
  background: rgba(46,138,94,0.35);
}
.cal-legend-row {
  display: flex;
  gap: 16px;
  justify-content: center;
  margin-bottom: 14px;
  flex-wrap: wrap;
}
.cal-legend-item {
  display: flex;
  align-items: center;
  gap: 5px;
  font-size: 0.76rem;
  color: var(--text-muted);
}
.cal-legend-swatch {
  width: 10px; height: 10px;
  border-radius: 3px;
}

/* Day detail panel */
.day-detail-panel {
  position: fixed;
  inset: 0;
  z-index: 400;
  background: rgba(100,110,130,0.45);
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
  display: flex;
  align-items: flex-end;
  justify-content: center;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.22s;
}
.day-detail-panel.open { opacity: 1; pointer-events: all; }
.day-detail-sheet {
  width: 100%;
  max-width: 480px;
  background: var(--bg2);
  border: 1px solid var(--border);
  border-bottom: none;
  border-radius: 20px 20px 0 0;
  padding: 20px 20px calc(20px + var(--safe));
  transform: translateY(30px);
  transition: transform 0.25s cubic-bezier(0.34, 1.4, 0.64, 1);
  max-height: 70vh;
  overflow-y: auto;
  box-shadow: 0 -4px 30px rgba(0,0,0,0.12);
}
.day-detail-panel.open .day-detail-sheet { transform: translateY(0); }
.day-detail-date {
  font-family: 'Playfair Display', serif;
  font-size: 1.25rem;
  font-weight: 600;
  color: var(--gold);
  margin-bottom: 14px;
}
.day-event-row {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 0;
  border-bottom: 1px solid var(--border);
  cursor: pointer;
}
.day-event-row:last-child { border-bottom: none; }
.day-event-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  flex-shrink: 0;
}
.day-event-info { flex: 1; min-width: 0; }
.day-event-name {
  font-size: 0.92rem;
  color: var(--text);
  font-weight: 500;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.day-event-sub {
  font-size: 0.76rem;
  color: var(--text-muted);
  margin-top: 2px;
}
.day-free-label {
  text-align: center;
  padding: 24px;
  color: var(--local);
  font-size: 0.85rem;
  font-weight: 500;
}
.day-add-btn {
  width: 100%;
  margin-top: 12px;
  padding: 11px;
  background: var(--gold-dim);
  border: 1px solid rgba(200,148,58,0.3);
  border-radius: 10px;
  color: var(--gold);
  font-family: 'DM Sans', sans-serif;
  font-size: 0.9rem;
  font-weight: 600;
  cursor: pointer;
  letter-spacing: 0.04em;
}

/* ── EMPTY STATE ── */
.empty-state {
  text-align: center;
  padding: 60px 20px;
  color: var(--text-muted);
}
.empty-state svg { opacity: 0.3; margin-bottom: 12px; }
.empty-state p { font-size: 0.85rem; }

/* ── LEGEND ── */
.legend-section {
  padding: 12px 16px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  margin: 0 16px 16px;
  box-shadow: 0 1px 4px rgba(0,0,0,0.05);
}
.legend-title {
  font-size: 0.72rem;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--text-muted);
  margin-bottom: 10px;
  font-weight: 600;
}
.legend-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 6px;
}
.legend-item {
  display: flex;
  align-items: center;
  gap: 7px;
  font-size: 0.8rem;
  color: var(--text-dim);
}
.legend-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  flex-shrink: 0;
}
</style>
</head>

let nextId = 500;
let currentFilter = 'all';
let firestoreReady = false;

async function loadFromFirestore() {
  if (!CONFIG_REF || !EVENTS_REF) { render(); renderCalendar(); return; }
  try {
    const configSnap = await CONFIG_REF.get();
    const config = configSnap.exists ? configSnap.data() : {};
    if (config.nextId != null) nextId = config.nextId;
    if (Array.isArray(config.categories) && config.categories.length > 0) CATEGORIES = config.categories;

    const eventsSnap = await EVENTS_REF.get();
    if (!eventsSnap.empty) {
      const list = eventsSnap.docs.map(d => {
        const data = d.data();
        return {
          id: parseInt(d.id, 10) || data.id,
          name: data.name || '',
          start: data.start || '',
          end: data.end || '',
          desc: data.desc || '',
          cat: data.cat || 'gray',
          level: data.level || 'local',
          comite: data.comite || '',
          timeStart: data.timeStart || '',
          timeEnd: data.timeEnd || ''
        };
      });
      events = list.sort((a, b) => (a.start || '').localeCompare(b.start || ''));
    }
    firestoreReady = true;
  } catch (err) {
    console.warn('Firestore load:', err);
  }
  render();
  renderCalendar();
}

async function saveEventToFirestore(evt) {
  if (!EVENTS_REF) return;
  const { id, name, start, end, desc, cat, level, comite, timeStart, timeEnd } = evt;
  await EVENTS_REF.doc(String(id)).set({ name, start, end, desc, cat, level, comite: comite || '', timeStart: timeStart || '', timeEnd: timeEnd || '' });
}

async function deleteEventFromFirestore(id) {
  if (!EVENTS_REF) return;
  await EVENTS_REF.doc(String(id)).delete();
}

async function saveConfigToFirestore() {
  if (!CONFIG_REF) return;
  await CONFIG_REF.set({ nextId, categories: CATEGORIES }, { merge: true });
}

let editingId = null;
let selectedLevel = 'local';
let currentViewMode = 'list';
let calYear = 2026;
let calMonth = 0;
let selectedDayDate = null;

function parseDate(s) {
  const [y,m,d] = s.split('-').map(Number);
  return new Date(y, m-1, d);
}
function dateDiff(s, e) {
  return Math.round((parseDate(e) - parseDate(s)) / 86400000) + 1;
}
function isError(evt) {
  return dateDiff(evt.start, evt.end) > 3;
}

function levelColor(l) {
  if (l === 'nacional') return '#c8943a';
  if (l === 'distrital') return '#48acd4';
  return '#52a878';
}

function render() {
  // Stats
  const filtered = currentFilter === 'all' ? events : events.filter(e => e.level === currentFilter);
  const nac = events.filter(e => e.level === 'nacional').length;
  const dist = events.filter(e => e.level === 'distrital').length;
  const loc = events.filter(e => e.level === 'local').length;
  document.getElementById('statsBar').innerHTML = `
    <div class="stat-item nac"><div class="stat-num">${nac}</div><div class="stat-label">Nacional</div></div>
    <div class="stat-item dist"><div class="stat-num">${dist}</div><div class="stat-label">Distrital</div></div>
    <div class="stat-item loc"><div class="stat-num">${loc}</div><div class="stat-label">Local</div></div>
  `;

  // Legend
  document.getElementById('legendGrid').innerHTML = CATEGORIES.map(c =>
    `<div class="legend-item"><div class="legend-dot" style="background:${c.color}"></div><span>${c.label}</span></div>`
  ).join('');

  // Sort events by date
  const sorted = [...filtered].sort((a,b) => a.start.localeCompare(b.start));

  // Group by month
  const byMonth = {};
  sorted.forEach(e => {
    const m = e.start.substring(0, 7); // YYYY-MM
    if (!byMonth[m]) byMonth[m] = [];
    byMonth[m].push(e);
  });

  const list = document.getElementById('eventsList');
  if (sorted.length === 0) {
    list.innerHTML = `<div class="empty-state"><svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg><p>No hay eventos para este filtro</p></div>`;
    return;
  }

  list.innerHTML = Object.entries(byMonth).map(([key, evts]) => {
    const [y, m] = key.split('-').map(Number);
    const monthName = MONTHS[m-1];
    const dots = ['nacional','distrital','local'].filter(l => evts.some(e => e.level === l)).map(l =>
      `<div class="month-dot" style="background:${levelColor(l)}"></div>`
    ).join('');
    const cards = evts.map(e => renderCard(e)).join('');
    return `<div class="month-group">
      <div class="month-header">
        <span class="month-name">${monthName}</span>
        <span class="month-count">${evts.length} evento${evts.length!==1?'s':''}</span>
        <div class="month-dots">${dots}</div>
      </div>
      ${cards}
    </div>`;
  }).join('');
}

function renderCard(e) {
  const s = parseDate(e.start);
  const isMulti = e.start !== e.end;
  const days = dateDiff(e.start, e.end);
  const hasError = isError(e);
  const endD = parseDate(e.end);
  const multiStr = isMulti ? `${days} días` : '';
  return `<div class="event-card ev-${e.level} ${hasError ? 'ev-error' : ''}" onclick="openEditModal(${e.id})">
    <div class="event-date-col">
      <div class="event-day">${s.getDate()}</div>
      <div class="event-month-short">${MONTHS_SHORT[s.getMonth()]}</div>
      ${isMulti ? `<div class="event-multi-day">→${endD.getDate()}</div>` : ''}
    </div>
    <div class="event-body">
      <div class="event-name">${e.name}</div>
      <div class="event-meta">
        <span class="level-badge badge-${e.level}">${e.level}</span>
        <span class="cat-tag" style="color:${catColor(e.cat)}">${catLabel(e.cat)}</span>
        ${e.comite ? `<span class="cat-tag" style="color:var(--sky);border-color:rgba(72,172,212,0.2)">${e.comite}</span>` : ''}
      </div>
      ${(e.timeStart||e.desc) ? `<div class="event-desc">${[e.timeStart?(e.timeStart+(e.timeEnd?'–'+e.timeEnd:'')+'h'):null, e.desc].filter(Boolean).join(' · ')}</div>` : ''}
    </div>
    ${hasError ? `<div class="error-icon" title="Evento de más de 3 días consecutivos">⚠️</div>` : ''}
  </div>`;
}

function setFilter(f) {
  currentFilter = f;
  ['all','nacional','distrital','local'].forEach(x => {
    const p = document.getElementById('pill-'+x);
    p.className = 'filter-pill';
    if (x === f) p.className = 'filter-pill active-'+x;
  });
  render();
}

function setView(v) {
  currentViewMode = v;
  document.getElementById('listSection').classList.toggle('active', v==='list');
  document.getElementById('calSection').classList.toggle('active', v==='cal');
  ['list','cal'].forEach(t => {
    document.getElementById('tab-'+t).classList.toggle('active', t===v);
  });
  if (v==='cal') renderCalendar();
}

  document.getElementById('evtName').value = '';
  document.getElementById('evtStart').value = '2026-01-01';
  document.getElementById('evtEnd').value = '2026-01-01';
  document.getElementById('evtDesc').value = '';
  document.getElementById('evtComite').value = '';
  document.getElementById('evtTimeStart').value = '';
  document.getElementById('evtTimeEnd').value = '';
  document.getElementById('btnDelete').style.display = 'none';
  refreshLevelBtns();

function openEditModal(id) {
  const e = events.find(x => x.id === id);
  if (!e) return;
  editingId = id;
  selectedLevel = e.level;
  document.getElementById('modalTitle').textContent = 'Editar Evento';
  document.getElementById('evtName').value = e.name;
  document.getElementById('evtStart').value = e.start;
  document.getElementById('evtEnd').value = e.end;
  document.getElementById('evtDesc').value = e.desc || '';
  document.getElementById('evtComite').value = e.comite || '';
  document.getElementById('evtTimeStart').value = e.timeStart || '';
  document.getElementById('evtTimeEnd').value = e.timeEnd || '';
  document.getElementById('btnDelete').style.display = '';
  refreshLevelBtns();
  buildCatSelect(e.cat);
  document.getElementById('eventModal').classList.add('open');
}

    b.className = 'level-btn' + (selectedLevel === l ? ' sel-'+l : '');

  document.getElementById('eventModal').classList.remove('open');

function saveEvent() {
  const name = document.getElementById('evtName').value.trim();
  if (!name) { alert('El nombre del evento es obligatorio'); return; }
  const start = document.getElementById('evtStart').value;
  const end = document.getElementById('evtEnd').value || start;
  const desc = document.getElementById('evtDesc').value.trim();
  const cat = document.getElementById('evtCat').value;
  const comite = document.getElementById('evtComite').value;
  const timeStart = document.getElementById('evtTimeStart').value;
  const timeEnd = document.getElementById('evtTimeEnd').value;
  if (editingId !== null) {
    const e = events.find(x => x.id === editingId);
    if (e) { e.name=name; e.start=start; e.end=end; e.desc=desc; e.cat=cat; e.level=selectedLevel; e.comite=comite; e.timeStart=timeStart; e.timeEnd=timeEnd; saveEventToFirestore(e); }
  } else {
    const newId = nextId++;
    const newEvt = { id: newId, name, start, end, desc, cat, level: selectedLevel, comite, timeStart, timeEnd };
    events.push(newEvt);
    saveEventToFirestore(newEvt);
    saveConfigToFirestore();
  }
  closeModal();
  render();
}

function deleteEvent() {
  if (editingId === null) return;
  if (!confirm('¿Eliminar este evento?')) return;
  const idToDelete = editingId;
  events = events.filter(x => x.id !== editingId);
  deleteEventFromFirestore(idToDelete);
  closeModal();
  render();
}

// ── CALENDAR VIEW ────────────────────────────────────────────────────────────
const CAL_DAY_NAMES = ['Lu','Ma','Mi','Ju','Vi','Sá','Do'];

function calChangeMonth(d) {
  calMonth += d;
  if (calMonth < 0) { calMonth = 11; calYear--; }
  if (calMonth > 11) { calMonth = 0; calYear++; }
  renderCalendar();
}

function renderCalendar() {
  const today = new Date();
  document.getElementById('calMonthTitle').innerHTML =
    MONTHS[calMonth] + ' <strong>' + calYear + '</strong>';

  // Day headers
  document.getElementById('calDayHeaders').innerHTML =
    CAL_DAY_NAMES.map((d,i) =>
      `<div class="cal-day-hdr ${i>=5?'weekend':''}">${d}</div>`
    ).join('');

  const firstDay = new Date(calYear, calMonth, 1);
  const lastDay = new Date(calYear, calMonth+1, 0);
  const startDow = (firstDay.getDay() + 6) % 7;

  let html = '';

  // Prev month padding
  const prevLast = new Date(calYear, calMonth, 0);
  for (let i = startDow-1; i >= 0; i--) {
    html += `<div class="cal-cell other-month"><div class="cal-num">${prevLast.getDate()-i}</div></div>`;
  }

  // Current month days
  for (let d = 1; d <= lastDay.getDate(); d++) {
    const dow = (new Date(calYear, calMonth, d).getDay() + 6) % 7;
    const isWeekend = dow >= 5;
    const isToday = today.getFullYear()===calYear && today.getMonth()===calMonth && today.getDate()===d;
    const dateStr = calYear+'-'+String(calMonth+1).padStart(2,'0')+'-'+String(d).padStart(2,'0');
    const dayEvts = events.filter(e => {
      const s = parseDate(e.start), en = parseDate(e.end);
      const t = parseDate(dateStr);
      return t >= s && t <= en;
    });
    const hasFree = dayEvts.length === 0;
    const dots = dayEvts.slice(0,4).map(e =>
      `<div class="cal-dot" style="background:${catColor(e.cat)}"></div>`
    ).join('');
    html += `<div class="cal-cell ${isWeekend?'weekend':''} ${isToday?'today':''} ${hasFree?'free':'has-events'}"
      onclick="openDayDetail('${dateStr}')">
      <div class="cal-num">${d}</div>
      ${dots ? `<div class="cal-dots">${dots}</div>` : '<div class="cal-free-badge"></div>'}
    </div>`;
  }

  // Next month fill
  const total = startDow + lastDay.getDate();
  const rem = (7 - (total % 7)) % 7;
  for (let d = 1; d <= rem; d++) {
    html += `<div class="cal-cell other-month"><div class="cal-num">${d}</div></div>`;
  }

  document.getElementById('calGrid').innerHTML = html;
}

// ── DAY DETAIL PANEL ─────────────────────────────────────────────────────────
function openDayDetail(dateStr) {
  selectedDayDate = dateStr;
  const [y,m,d] = dateStr.split('-').map(Number);
  const dt = new Date(y, m-1, d);
  const dayNames = ['domingo','lunes','martes','miércoles','jueves','viernes','sábado'];
  document.getElementById('dayDetailDate').textContent =
    dayNames[dt.getDay()] + ', ' + d + ' de ' + MONTHS[m-1] + ' de ' + y;

  const dayEvts = events.filter(e => {
    const s = parseDate(e.start), en = parseDate(e.end), t = parseDate(dateStr);
    return t >= s && t <= en;
  }).sort((a,b) => (a.timeStart||'').localeCompare(b.timeStart||''));

  if (dayEvts.length === 0) {
    document.getElementById('dayDetailEvents').innerHTML =
      '<div class="day-free-label">✅ Día libre — sin eventos</div>';
  } else {
    document.getElementById('dayDetailEvents').innerHTML = dayEvts.map(e => {
      const timeStr = e.timeStart ? (e.timeStart + (e.timeEnd ? '–'+e.timeEnd : '')+'h') : '';
      const sub = [timeStr, e.level, e.comite].filter(Boolean).join(' · ');
      return `<div class="day-event-row" onclick="openEditModal(${e.id}); closeDayDetail()">
        <div class="day-event-dot" style="background:${catColor(e.cat)}"></div>
        <div class="day-event-info">
          <div class="day-event-name">${e.name}</div>
          ${sub ? `<div class="day-event-sub">${sub}</div>` : ''}
        </div>
        <span style="color:var(--text-muted);font-size:0.8rem">›</span>
      </div>`;
    }).join('');
  }

  document.getElementById('dayDetailPanel').classList.add('open');
}

function closeDayDetail() {
  document.getElementById('dayDetailPanel').classList.remove('open');
}

function handleDayPanelClick(e) {
  if (e.target === e.currentTarget) closeDayDetail();
}

function addEventFromDay() {
  closeDayDetail();
  if (selectedDayDate) {
    editingId = null;
    selectedLevel = 'local';
    document.getElementById('modalTitle').textContent = 'Nuevo Evento';
    document.getElementById('evtName').value = '';
    document.getElementById('evtStart').value = selectedDayDate;
    document.getElementById('evtEnd').value = selectedDayDate;
    document.getElementById('evtDesc').value = '';
    document.getElementById('evtComite').value = '';
    document.getElementById('evtTimeStart').value = '';
    document.getElementById('evtTimeEnd').value = '';
    document.getElementById('btnDelete').style.display = 'none';
    refreshLevelBtns();
    buildCatSelect('gold');
    document.getElementById('eventModal').classList.add('open');
  }
}


// ── CATEGORY SELECT BUILDER ─────────────────────────────────────────────────
function buildCatSelect(selectedVal) {
  const sel = document.getElementById('evtCat');
  sel.innerHTML = CATEGORIES.map(c =>
    `<option value="${c.id}" ${c.id === selectedVal ? 'selected' : ''}>${c.label}</option>`
  ).join('');
}

// ── CATEGORY MANAGER ─────────────────────────────────────────────────────────
let catEdits = [];

function openCatManager() {
  catEdits = CATEGORIES.map(c => ({...c}));
  renderCatList();
  document.getElementById('catManagerModal').classList.add('open');
}

function closeCatManager() {
  document.getElementById('catManagerModal').classList.remove('open');
}

function handleCatOverlayClick(e) {
  if (e.target === e.currentTarget) closeCatManager();
}

function renderCatList() {
  const list = document.getElementById('catList');
  list.innerHTML = catEdits.map((c, i) => `
    <div class="cat-item">
      <div class="cat-swatch" style="background:${c.color}" title="Cambiar color">
        <input type="color" value="${c.color}" oninput="catEdits[${i}].color=this.value; this.parentElement.style.background=this.value">
      </div>
      <input class="cat-item-label" type="text" value="${c.label}" oninput="catEdits[${i}].label=this.value" placeholder="Nombre categoría"/>
      <button class="cat-del-btn" onclick="deleteCatEdit(${i})" title="Eliminar">✕</button>
    </div>
  `).join('');
}

function deleteCatEdit(i) {
  if (catEdits.length <= 1) { alert('Debe haber al menos una categoría'); return; }
  catEdits.splice(i, 1);
  renderCatList();
}

function addNewCategory() {
  const colors = ['#c46060','#c8a96e','#4ab0d4','#6aab6a','#5a8ec8','#5aab9b','#d4845a','#9b7ec8','#c47a9b','#667080','#6b7280'];
  const color = colors[catEdits.length % colors.length];
  const newId = 'cat_' + Date.now();
  catEdits.push({ id: newId, label: 'Nueva categoría', color });
  renderCatList();
  setTimeout(() => {
    const inputs = document.querySelectorAll('.cat-item-label');
    const last = inputs[inputs.length-1];
    if (last) { last.focus(); last.select(); }
  }, 50);
}

async function saveCatManager() {
  if (catEdits.some(c => !c.label.trim())) {
    alert('Todas las categorías deben tener nombre'); return;
  }
  CATEGORIES = catEdits.map(c => ({...c, label: c.label.trim()}));
  await saveConfigToFirestore();
  buildCatSelect(document.getElementById('evtCat')?.value || CATEGORIES[0].id);
  closeCatManager();
  render();
}

// Inicio: cargar desde Firestore si está configurado, si no usar datos en memoria
if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', () => loadFromFirestore());
} else {
  loadFromFirestore();
}
</script>

<!-- Category Manager Modal -->
<div class="cat-manager-overlay" id="catManagerModal" onclick="handleCatOverlayClick(event)">
  <div class="cat-manager-sheet" onclick="event.stopPropagation()">
    <div class="modal-handle"></div>
    <div class="modal-title">Gestionar Categorías</div>
    <p style="font-size:0.73rem;color:var(--text-muted);margin-bottom:4px">Toca el color para cambiarlo. Edita el nombre directamente.</p>
    <div class="cat-list" id="catList"></div>
    <button class="btn-add-cat" onclick="addNewCategory()">+ Nueva categoría</button>
    <div class="modal-actions" style="margin-top:16px">
      <button class="btn-cancel" onclick="closeCatManager()">Cerrar</button>
      <button class="btn-save" onclick="saveCatManager()">Guardar</button>
    </div>
  </div>
</div>
